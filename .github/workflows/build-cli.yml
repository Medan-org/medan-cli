name: Setup Medan CLI

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize npm
        run: npm init -y

      - name: Install TypeScript + Node types
        run: npm install typescript ts-node @types/node

      - name: Install Commander
        run: npm install commander

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json package-lock.json
          git commit -m "Initialize CLI project" || echo "No changes to commit"
          git push
