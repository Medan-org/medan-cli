name: Build & Test Medan CLI

on:
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Medan CLI
        run: npm run build

      - name: "Test: Medan CLI help command"
        run: node dist/index.js medan --help

      - name: "Test: Medan identity command"
        run: node dist/index.js medan

      - name: "Test: Nano command"
        run: node dist/index.js nano test.txt

      - name: "Test: Curl command"
        run: node dist/index.js curl https://example.com
